<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lily Pad Hop</title>
    <style>
        /* Strict Fullscreen Reset */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #001100;
            overflow: hidden; /* Removes scrollbars */
        }
        
        #ruffle-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Force Ruffle to fill the container */
        ruffle-player {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }
    </style>
</head>
<body>
    <div id="ruffle-container"></div>

    <!-- Ruffle Engine -->
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

    <!-- Firebase SDK Compat libraries (Drop-in replacements for simple HTML sites) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // *** PASTE YOUR FIREBASE CONFIG HERE ***
        // You can find this in your Firebase Console -> Project Settings -> General -> Your Apps
        const firebaseConfig = {
            apiKey: "AIzaSyCMSpev_qJxhNkmyYcsyj7wWip1LWyHv_Y",
            authDomain: "lilypadhop-59ea5.firebaseapp.com",
            projectId: "lilypadhop-59ea5", 
            storageBucket: "lilypadhop-59ea5.firebasestorage.app",
            messagingSenderId: "740869273083",
            appId: "1:740869273083:web:90cf5be99b980b580d075e"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let rufflePlayerInstance = null;

        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("load", (event) => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("ruffle-container");
            container.appendChild(player);
            
            rufflePlayerInstance = player;

            player.config = {
                "allowScriptAccess": true,
                "scale": "showAll", 
                "backgroundColor": "#001100",
                "letterbox": "on", 
                "autoplay": "on",
                "unmuteOverlay": "hidden",
                "quality": "low" // Maintained your quality setting
            };

            player.load("LilyPadHop.swf");
        });
        
        // --- Helper to talk to Flash ---
        function callAS3(func, ...args) {
            if (rufflePlayerInstance && typeof rufflePlayerInstance[func] === "function") {
                rufflePlayerInstance[func](...args);
            }
        }

        // --- FIREBASE FIRESTORE INTEGRATION ---

        window.js_login = async function(user, pass) {
            console.log("JS: Logging in via Firebase...");
            try {
                // Using lowercase username as the document ID so it's case insensitive
                const docRef = db.collection("users").doc(user.toLowerCase());
                const doc = await docRef.get();

                if (doc.exists) {
                    const data = doc.data();
                    if (data.password === pass) {
                        callAS3("as_onLoginResult", "success", "", Number(data.points) || 0, data.xmlData || "");
                    } else {
                        callAS3("as_onLoginResult", "error", "Incorrect password", 0, "");
                    }
                } else {
                    callAS3("as_onLoginResult", "error", "User not found. Please create an account.", 0, "");
                }
            } catch(e) {
                console.error("Firebase Login Error:", e);
                callAS3("as_onLoginResult", "error", "Database connection failed.", 0, "");
            }
        }

        window.js_register = async function(user, pass) {
            console.log("JS: Registering Account via Firebase...");
            try {
                const docRef = db.collection("users").doc(user.toLowerCase());
                const doc = await docRef.get();

                if (doc.exists) {
                    callAS3("as_onLoginResult", "error", "Username already exists.", 0, "");
                } else {
                    // Create the new user
                    await docRef.set({
                        username: user,
                        password: pass,
                        points: 0,
                        xmlData: "",
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    // Route back to existing login handler to auto-login
                    callAS3("as_onLoginResult", "success", "", 0, "");
                }
            } catch(e) {
                console.error("Firebase Register Error:", e);
                callAS3("as_onLoginResult", "error", "Database connection failed.", 0, "");
            }
        }

        window.js_saveScore = async function(user, pass, points) {
            console.log("JS: Saving Score via Firebase...");
            try {
                const docRef = db.collection("users").doc(user.toLowerCase());
                const doc = await docRef.get();
                
                if (doc.exists && doc.data().password === pass) {
                    // Increment points safely on the server side
                    await docRef.update({
                        points: firebase.firestore.FieldValue.increment(Number(points)),
                        lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    console.log("Score Saved Successfully");
                }
            } catch(e) {
                console.error("Firebase Save Score Error:", e);
            }
        }
        
        window.js_saveCloudData = async function(user, pass, xmlData) {
            console.log("JS: Saving Cloud XML Data via Firebase...");
            try {
                const docRef = db.collection("users").doc(user.toLowerCase());
                const doc = await docRef.get();
                
                if (doc.exists && doc.data().password === pass) {
                    await docRef.update({
                        xmlData: xmlData,
                        lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    console.log("Cloud Data Saved Successfully");
                }
            } catch(e) {
                console.error("Firebase Save Cloud Data Error:", e);
            }
        }

        window.js_getLeaderboard = async function() {
            console.log("JS: Fetching Leaderboard via Firebase...");
            try {
                // Fetch top 20 users sorted by points
                const snapshot = await db.collection("users")
                                         .orderBy("points", "desc")
                                         .limit(20)
                                         .get();
                
                let users = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data.points > 0) { // Don't show people with 0 points
                        users.push(data.username + " : " + data.points);
                    }
                });

                // Join them exactly how AS3 expects: "User1 : 100|User2 : 50"
                let lbString = users.join("|");
                callAS3("as_onLeaderboardResult", lbString);
                
            } catch(e) {
                console.error("Firebase Leaderboard Error:", e);
                callAS3("as_onLeaderboardResult", "Error: Database failed.");
            }
        }
    </script>
</body>
</html>
